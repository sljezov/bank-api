apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: bank-api-gateway:latest
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bank-config
                  key: USER_SERVICE_URL
            - name: ACCOUNT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bank-config
                  key: ACCOUNT_SERVICE_URL
            - name: TRANSFER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bank-config
                  key: TRANSFER_SERVICE_URL
            - name: BANK_SYNC_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bank-config
                  key: BANK_SYNC_SERVICE_URL
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bank-secrets
                  key: DATABASE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
spec:
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
  type: LoadBalancer
