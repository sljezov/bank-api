apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: account-service
  template:
    metadata:
      labels:
        app: account-service
    spec:
      containers:
        - name: account-service
          image: bank-account-service:latest
          ports:
            - containerPort: 3002
          env:
            - name: PORT
              value: "3002"
            - name: DB_SCHEMA
              value: accounts
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: bank-secrets
                  key: DATABASE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: bank-config
                  key: USER_SERVICE_URL
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
spec:
  selector:
    app: account-service
  ports:
    - port: 3002
      targetPort: 3002
